# Sphinx マスタークラス — Docker Compose
#
# サービス:
#   dev  : ライブリロード開発サーバー (http://localhost:8000)
#   html : HTML 一括ビルド
#   pdf  : PDF ビルド（TeX Live 使用）
#   epub : ePub ビルド
#
# プロキシ設定:
#   docker/.env ファイルに HTTP_PROXY / HTTPS_PROXY / NO_PROXY を記述するか、
#   シェルの環境変数として事前にエクスポートしてください。
#   例: cp docker/.env.example docker/.env

x-proxy-args: &proxy-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}

services:
  # ─── ライブリロード開発サーバー ─────────────────────
  dev:
    build:
      context: ..       # リポジトリルートを context に
      dockerfile: docker/Dockerfile
      args:
        <<: *proxy-args
    environment:
      <<: *proxy-args
    volumes:
      - ..:/workspace   # ソースの変更をリアルタイムに反映
    ports:
      - "8000:8000"
    working_dir: /workspace
    command: >
      sphinx-autobuild docs/source docs/build/html
      --host 0.0.0.0
      --port 8000
      --watch docs/source

  # ─── HTML ビルド ─────────────────────────────────
  html:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        <<: *proxy-args
    environment:
      <<: *proxy-args
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: sphinx-build -b html docs/source docs/build/html

  # ─── PDF ビルド ──────────────────────────────────
  pdf:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        <<: *proxy-args
    environment:
      <<: *proxy-args
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: sphinx-build -M latexpdf docs/source docs/build

  # ─── ePub ビルド ─────────────────────────────────
  epub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        <<: *proxy-args
    environment:
      <<: *proxy-args
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: sphinx-build -b epub docs/source docs/build/epub
